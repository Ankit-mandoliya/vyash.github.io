<html lang="en">

        .contact-section h2 {

        @media(max-width:768px) {

            .contact-section {
                /* text-align: center; */

<body>
    <header>
        <!-- place navbar here -->
        <div id="site-header"></div>

    </header>
    <main>

        <section class="contact-section py-5" style="background:#f8f9fa">

            <div class="container pt-5 mt-5">

                <div class="row">

                    <div class="col-lg-6">

                        <h2 class="mb-4">Contact Pandit Ji</h2>

                        <p>
                            For Puja Booking, Katha, Marriage Ceremony or any
                            religious ritual please contact us.
                        </p>

                        <ul class="list-unstyled mt-4">

                            <li class="mb-3">
                                <strong>Phone :</strong> +91 XXXXX XXXXX
                            </li>

                            <li class="mb-3">
                                <strong>Email :</strong> ankitmandoliya8@gmail.com
                            </li>

                            <li class="mb-3">
                                <strong>Location :</strong> India
                            </li>

                        </ul>

                    </div>


                    <div class="col-lg-6">

                        <form id="contact-form" class="p-4 bg-white shadow rounded"
                            action="https://api.web3forms.com/submit" method="POST">
                            <input type="hidden" name="access_key" value="0d3937c0-5495-46e3-a7a6-a1b7a0dd73b6">

                            <div class="mb-3">
                                <input type="text" name="name" class="form-control" placeholder="Your Name" required>
                            </div>

                            <div class="mb-3">
                                <input type="email" name="email" class="form-control" placeholder="Your Email" required>
                            </div>

                            <div class="mb-3">
                                <input type="text" name="phone" class="form-control" placeholder="Phone Number"
                                    required>
                            </div>

                            <div class="mb-3">
                                <textarea name="message" class="form-control" rows="4"
                                    placeholder="Your Message"></textarea>
                            </div>

                            <button type="submit" class="btn btn-warning w-100">
                                Send Message
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </section>
    </main>
    <div id="site-footer"></div>
    <!-- Bootstrap JavaScript Libraries -->
