<script>
  $(document).ready(async () => {
    let typewriterText = [
      '  Shree Ganesh Sundarkand',
      '  Sankirtan Mandal',
      'Devbhoomi Uttarakhand',
    ]
    let index = 0
    do {
      await typeText('#typewriter-text', typewriterText[index])
      await new Promise(res => setTimeout(res, 3 * 100));
      await untypeText('#typewriter-text', typewriterText[index])
      index += 1
      index = index % typewriterText.length
    } while (true)
  });

  function typeText(selector, text) {
    return new Promise((resolve) => {
      let element = $(selector);
      let charIndex = 0;
      let interval = setInterval(() => {
        if (charIndex < text.length) {
          element.text(element.text() + text[charIndex]);
          charIndex++;
        } else {
          clearInterval(interval);
          resolve();
        }
      }, 100);  // Adjust typing speed by changing the interval time
    });
  }

  function untypeText(selector, text) {
    return new Promise((resolve) => {
      let element = $(selector);
      let charIndex = text.length;
      let interval = setInterval(() => {
        if (charIndex > 0) {
          element.text(element.text().slice(0, -1));
          charIndex--;
        } else {
          clearInterval(interval);
          resolve();
        }
      }, 50);  // Adjust deleting speed by changing the interval time
    });
  }


</script>
<script>
  const btn = document.getElementById("backToTop");
  const circle = document.querySelector(".progress-ring__circle");
  const circumference = 2 * Math.PI * 22;

  circle.style.strokeDasharray = `${circumference}`;
  circle.style.strokeDashoffset = circumference;

  window.addEventListener("scroll", () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const scrollPercent = scrollTop / docHeight;

    const offset = circumference - scrollPercent * circumference;
    circle.style.strokeDashoffset = offset;

    if (scrollTop > 300) {
      btn.style.display = "flex";
    } else {
      btn.style.display = "none";
    }
  });

  btn.addEventListener("click", () => {
    window.scrollTo({
      top: 0,
      behavior: "smooth"
    });
  });
</script>
